<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Top Pressing | Quick Order</title>
 <style>
 :root{
  --bg: #e0f2fe; /* Light sky blue background */
  --card: #bae6fd; /* Medium light blue accent card */
  --text-color: #0369a1; /* Clean Dark Blue */
  --muted: #0c4a6e;
  --primary: #0284c7; /* Deep sky blue primary */
  --primary-dark: #0369a1;
  --radius: 12px;
  --shadow: 0 6px 18px rgba(9,30,63,0.08);
  --max-width: 450px; /* Centered narrow container card look */
  --transition: 200ms cubic-bezier(.2,.9,.3,1);
  --font-sans: "Inter", "Poppins", system-ui, -apple-system, sans-serif;
 }
 body {
  margin: 0;
  font-family: var(--font-sans);
  background: linear-gradient(180deg, var(--bg), #f0fbfb 100%);
  color: #0f1724;
  line-height: 1.45;
  padding: 40px 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
 }
 .container {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
 }
 /* ======================================= LOGO SECTION ======================================= */
 .logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  font-weight: 700;
  margin-bottom: 30px;
 }
 .logo-img {
  width: 90px;
  height: 90px;
  background-color: var(--primary);
  padding: 8px;
  border-radius: 20px;
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
 }
 .logo-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 14px;
 }
 .logo-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
 }
 .logo-text .en { font-size: 1.4rem; font-weight: 700; color: #0369a1; }
 .logo-text .ar { font-size: 1.1rem; font-weight: 700; color: #0284c7; direction: rtl; font-family: sans-serif; }
 /* ======================================= SIDEBAR & ORDER CARD ======================================= */
 .order {
  background: white;
  padding: 1.5rem;
  border-radius: 12px;
  box-shadow: var(--shadow);
  margin-bottom: 1.5rem;
 }
 .kicker {
  font-size: 1.1rem;
  color: var(--text-color);
  font-weight: 700;
  margin-bottom: 15px;
 }
 .form-row { display: flex; gap: .6rem; margin-bottom: .6rem; }
 .input, .select {
  width: 100%;
  padding: .75rem;
  border-radius: 8px;
  border: 1px solid #bae6fd;
  background: #f0f9ff;
  outline: none;
  font-size: .95rem;
  color: black;
  font-family: inherit;
 }
 .input:focus, .select:focus {
  box-shadow: 0 4px 16px rgba(2,132,199,0.1);
  border-color: var(--primary);
 }
 .btn {
  background: #0284c7;
  color: white;
  border: none;
  padding: .75rem 1.25rem;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
 }
 .btn:hover { transform: translateY(-2px); background: var(--primary-dark); }
 .btn.secondary {
  background: #bae6fd;
  color: #0369a1;
 }
 .btn.secondary:hover {
  background: #93c5fd;
 }
 .loader {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 3px solid rgba(0,0,0,0.06);
  border-top-color: var(--primary);
  animation: spin 1s linear infinite;
  display: none;
 }
 .current-list-item {
  font-size: 0.85rem;
  background: #f1f5f9;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
 }
 .delete-item-btn {
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 4px;
  width: 20px;
  height: 20px;
  font-size: 0.75rem;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 10px;
 }
 .delete-item-btn:hover {
  background: #dc2626;
 }
 .receipt-item {
  background: #f8fafc;
  border-left: 4px solid var(--primary);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  border-left-width: 4px;
 }
 .receipt-time { font-size: 0.75rem; color: #64748b; margin-top: 4px; display: block; }
 .receipt-sub-item {
  font-size: 0.8rem;
  color: #475569;
  padding-left: 10px;
  display: block;
 }
 .income-periods {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.income-period {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 12px 8px;
  background: #f0f9ff;
  color: #0369a1;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
  border: 1px solid #bae6fd;
}

.income-period span {
  display: block;
  font-size: 0.8rem;
  margin-bottom: 5px;
}

.income-period strong {
  display: block;
  font-size: 1rem;
  color: #0284c7;
}

.income-period:hover {
  background: #bae6fd;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(2, 132, 199, 0.15);
}
 @keyframes spin { to { transform: rotate(360deg); } }
 </style>
</head>
<body>

">

    <h2 style="color:#0369a1;">

</div>
 <div class="container">
   <!-- EMBEDDED LOGO PART -->

    <div class="logo-text">

   </div>
   <!-- ORDER AND HISTORY CONTAINER PARTS -->
   <aside class="sidebar">

     <!-- CUSTOMER CONTACT INFO FIELDS -->

     <!-- ITEM ADDER SUB-FORM -->
     <div style="border-top: 1px solid #e2e8f0; margin: 15px 0; padding-top: 15px;">
       <div class="form-row">
         <select class="select" id="itemType">
  <option value="">Select an item</option>
  <option value="Veste" data-price="100">Veste - 100 UM</option>

<input

</div>
       <div class="form-row" style="gap: .4rem;">
         <select class="select" id="itemQuantity" style="flex: 1;">
           <option value="1">Qty: 1</option><option value="2">Qty: 2</option>
           <option value="3">Qty: 3</option><option value="4">Qty: 4</option>
           <option value="5">Qty: 5</option><option value="6">Qty: 6</option>
           <option value="7">Qty: 7</option><option value="8">Qty: 8</option>
           <option value="9">Qty: 9</option><option value="10">Qty: 10</option>
         </select>
         <input class="input" type="number" id="itemPrice" placeholder="Price (UM)" min="0" style="flex: 1.2;">
       </div> 
       <div class="form-row">
         <button class="btn secondary" id="addItemBtn">+ Add Item to List</button>
       </div>
     </div>

     <!-- LIVE BASKET REVIEW BLOCK -->
     <div id="currentOrderBasket" style="margin: 15px 0; border-top: 1px dashed #bae6fd; padding-top: 10px; display: none;">
       <div style="font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: var(--text-color);">Items in this order:</div>

     <div style="display:flex; gap:.6rem; margin-top:.6rem; align-items: center;">
      <button class="btn cta" id="requestPickupBtn" style="display: none; background: #25D366;">🟢 Send via WhatsApp</button>
      <div class="loader" id="orderLoader" aria-hidden="true"></div>
     </div>
    </div>
    
    <!-- RECEIPT HISTORY PREVIEW SECTION -->
    <div class="order" style="margin-top: 1.5rem;" id="receiptBox">
      <!-- INCOME TRACKER -->
      <div class="order">

  <div class="kicker">
    💰 Income Tracker
  </div>

  <button
    id="showPaidBtn"
    class="btn"
    style="background:#22c55e; margin-bottom:10px;"
  >
    💰 Paid Orders
    (<span id="paidTotal">0 UM</span>)
  </button>

  <button
    id="showUnpaidBtn"
    class="btn"
    style="background:#ef4444; margin-bottom:10px;"
  >
    ⏳ Unpaid Orders
    (<span id="unpaidTotal">0 UM</span>)
  </button>

  <button
    id="showAllBtn"

    📋 Show All Orders
  </button>

  <hr>

      <span>📅 Today</span>
      <strong id="dailyIncome">0 UM</strong>
  </button>

  <button id="weeklyIncomeBtn" class="income-period">
    <span>📅 This Week</span>
    <strong id="weeklyIncome">0 UM</strong>
  </button>

    <span>📅 This Month</span>
    <strong id="monthlyIncome">0 UM</strong>
  </button>

</div>

</div>
     <div class="kicker">Order History Receipts</div>
      <button class="btn secondary" id="clearHistoryBtn" style="background:#fee2e2; color:#ef4444; padding:5px 10px; font-size:0.75rem; margin-bottom:10px; width:auto; border:1px solid #fca5a5;">🗑️ Clear History</button>
     <div id="receiptHistoryList" style="max-height: 250px; overflow-y: auto; margin-top: 10px; font-size: 0.85rem;">
      <p style="color: #64748b;">No past orders found.</p>
     </div>
    </div>
   </aside> 
 </div>

<script>
const loginScreen = document.getElementById("loginScreen");
const loginPassword = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");

const OWNER_PASSWORD = "Bo26862$$/Top";


loginBtn.addEventListener("click",() => {

  if(loginPassword.value === OWNER_PASSWORD){
    loginScreen.style.display = "none";
    localStorage.setItem("topPressingLogin","true");
  }
});


// Keep logged in after refresh

if(localStorage.getItem("topPressingLogin") === "true"){
  loginScreen.style.display = "none";
}

document.addEventListener("DOMContentLoaded", () => {

  const showPaidBtn = document.getElementById("showPaidBtn");
  const showUnpaidBtn = document.getElementById("showUnpaidBtn");
  const showAllBtn = document.getElementById("showAllBtn");
  const dailyIncomeBtn = document.getElementById("dailyIncomeBtn");
  const weeklyIncomeBtn = document.getElementById("weeklyIncomeBtn");
  const monthlyIncomeBtn = document.getElementById("monthlyIncomeBtn");
  
  showPaidBtn.addEventListener("click", () => {
  displayReceipts("", "Paid");
});


showUnpaidBtn.addEventListener("click", () => {
  displayReceipts("", "Unpaid");
});

showAllBtn.addEventListener("click", () => {
  displayReceipts();
});

dailyIncomeBtn.addEventListener("click", () => {

  let now = new Date();

  let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  let dailyReceipts = receipts.filter(receipt => {

    if(receipt.paymentStatus !== "Paid"){

      return false;
    }

    let paidDate = new Date(receipt.paidDate);

    return paidDate.toDateString() === now.toDateString();
  });

  displayReceiptsFromList(dailyReceipts);

});

weeklyIncomeBtn.addEventListener("click", () => {

  let now = new Date();

  let startOfWeek = new Date(now);

  startOfWeek.setDate(
    now.getDate() - now.getDay()
  );

  startOfWeek.setHours(0, 0, 0, 0);

  let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  let weeklyReceipts = receipts.filter(receipt => {

    if(receipt.paymentStatus !== "Paid"){
      return false;
    }

    let paidDate = new Date(receipt.paidDate);

    return paidDate >= startOfWeek;

  });

  displayReceiptsFromList(dailyReceipts);

});

monthlyIncomeBtn.addEventListener("click", () => {

  let now = new Date();

  let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  let monthlyReceipts = receipts.filter(receipt => {

    if(receipt.paymentStatus !== "Paid"){
      return false;
    }

    let paidDate = new Date(receipt.paidDate);

    return (
      paidDate.getMonth() === now.getMonth() &&
      paidDate.getFullYear() === now.getFullYear()
    );
  });

  displayReceiptsFromList(monthlyReceipts);

});

  const custNameInput = document.getElementById("custName");
  const custPhoneInput = document.getElementById("custPhone");

  const itemTypeInput = document.getElementById("itemType");
  const customItemInput = document.getElementById("customItem");

  const quantitySelect = document.getElementById("itemQuantity");
  const priceInput = document.getElementById("itemPrice");

  const addItemBtn = document.getElementById("addItemBtn");
  const requestBtn = document.getElementById("requestPickupBtn");

  const basketContainer = document.getElementById("currentOrderBasket");
  const basketList = document.getElementById("basketItemsList");

  const historyContainer = document.getElementById("receiptHistoryList");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");


  let currentCartItems = [];

  quantitySelect.innerHTML = "";

  for(let i = 1; i <= 200; i++){

    let option = document.createElement("option");

    option.value = i;
    option.textContent = `Qty: ${i}`;

    quantitySelect.appendChild(option);

  }

  itemTypeInput.addEventListener("change",()=>{

    let selected = itemTypeInput.options[itemTypeInput.selectedIndex];
    let price = selected.dataset.price;

    if(itemTypeInput.value === "Others"){

      customItemInput.style.display="block";
      priceInput.value="";

    } else {
      customItemInput.style.display="none";
      priceInput.value = price;
    }
  });


  function updateBasketUI(){

    if(currentCartItems.length === 0){
      basketContainer.style.display="none";
      requestBtn.style.display="none";
      return;
    }

    basketContainer.style.display="block";
    requestBtn.style.display="block";

    basketList.innerHTML =
    currentCartItems.map((item,index)=>`

      <div class="current-list-item">

        <span>
        ${item.name} x${item.qty}
        (${item.totalItemPrice} UM)
        </span>

        <button 
        class="delete-item-btn"
        onclick="deleteBasketItem(${index})">
        X
        </button>

      </div>

    `).join("");

  }


  window.deleteBasketItem = function(index){
    currentCartItems.splice(index,1);
    updateBasketUI()
  };

  addItemBtn.addEventListener("click",()=>{

    let name;

    if(itemTypeInput.value === "Others"){
      name = customItemInput.value.trim();
    } else {
      name = itemTypeInput.value;
    }

    let qty = parseInt(quantitySelect.value);
    let price = parseFloat(priceInput.value);

    if(!name){
      alert("Select an item");
      return;
    }

    if(isNaN(price)){
      alert("Enter price");
      return;
    }

    currentCartItems.push({
      name:name,
      qty:qty,
      totalItemPrice:
      price * qty
    });

    updateBasketUI();

    itemTypeInput.value="";
    customItemInput.value="";
    customItemInput.style.display="none";

    priceInput.value="";
    quantitySelect.value="1";


  });

  function displayReceipts(search = "", statusFilter = ""){

  let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  let filtered = receipts.filter(receipt => {

    const matchesSearch = receipt.customerName.toLowerCase().includes(search.toLowerCase()) || receipt.customerPhone.includes(search);
    const matchesStatus =
      statusFilter === "" ||
      receipt.paymentStatus === statusFilter;

    return matchesSearch && matchesStatus;

  });
  
  if(filtered.length === 0){

    historyContainer.innerHTML =

    "<p>No receipts found.</p>";

    return;

  }

    historyContainer.innerHTML="";

    filtered.forEach(receipt=>{

      let items="";

      receipt.itemsList.forEach(item=>{

        items += `
        <div class="receipt-sub-item">
        • ${item.name} x${item.qty}
        - ${item.totalItemPrice} UM
        </div>
        `;

      });

      historyContainer.innerHTML += `

        <div class="receipt-item">

        <strong>
          🧾 Receipt #${receipt.id}
        </strong>

      <br>

      ${receipt.customerName}

      <br>

      📱 ${receipt.customerPhone}

      <br><br>

      ${items}

     <strong>Total: ${receipt.totalOrderPrice} UM</strong><br>

    <span style=" font-weight:bold;
      color:${receipt.paymentStatus === "Paid" ? "green" : "red"};">
      ${receipt.paymentStatus === "Paid" ? "✅ Paid" : "❌ Unpaid"}
    </span>

    ${receipt.paymentStatus !== "Paid" ? `<button class="btn secondary" style="margin-top:10px; background:#22c55e; color:white;" onclick="markAsPaid(${receipt.id})">
      ✅ Mark as Paid
    </button>`
    : ""}

<br>

        <span class="receipt-time">
          📅 ${receipt.dateTime}
        </span>
</div>

         `;
      });
    }
   
  function displayReceiptsFromList(receipts){

  if(receipts.length === 0){

    historyContainer.innerHTML =
      "<p>No receipts found.</p>";

    return;

  }

  historyContainer.innerHTML = "";

  receipts.forEach(receipt => {

    let items = "";

    receipt.itemsList.forEach(item => {

      items += `
        <div class="receipt-sub-item">
          • ${item.name} x${item.qty}
          - ${item.totalItemPrice} UM
        </div>
      `;

    });

    historyContainer.innerHTML += `

      <div class="receipt-item">

        <strong>
          🧾 Receipt #${receipt.id}
        </strong>

        <br>

        ${receipt.customerName}

        <br>

        📱 ${receipt.customerPhone}

        <br><br>

        ${items}

        <strong>
          Total: ${receipt.totalOrderPrice} UM
        </strong>

        <br>

        <span style="font-weight:bold; color:green;">
          ✅ Paid
        </span>

        <br>

        <span class="receipt-time">
          📅 ${receipt.dateTime}
        </span>

      </div>

    `;

  });
}

  custNameInput.addEventListener("input",()=>{

    displayReceipts(custNameInput.value);
  });

  custPhoneInput.addEventListener("input",()=>{

    displayReceipts(custPhoneInput.value);
  });

  requestBtn.addEventListener("click",()=>{

    const customerName = custNameInput.value.trim();
    const customerPhone = custPhoneInput.value.trim();

    if(!customerName || !customerPhone){
      alert("Enter customer information");
      return;
    }



    let now = new Date();

    let timestamp = now.toLocaleDateString() +" " + now.toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    });

    let total = currentCartItems.reduce(
      (sum,item)=>
      sum+item.totalItemPrice,
      0
    );

    let lastReceiptNumber = parseInt(localStorage.getItem("lastReceiptNumber")) || 37999;
    let orderId = lastReceiptNumber + 1;

      localStorage.setItem("lastReceiptNumber", orderId);


    const receipt = {
      id: orderId,
      customerName,
      customerPhone,
      itemsList: currentCartItems,
      totalOrderPrice: total,
      dateTime: timestamp,
      paymentStatus: "Unpaid",
      paidDate: null
    };

    let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

    receipts = receipts.map(receipt => {

  if(!receipt.paymentStatus){
    receipt.paymentStatus = "Unpaid";
  }

  return receipt;

});

receipts.unshift(receipt);

localStorage.setItem(
  "laundryReceipts",
  JSON.stringify(receipts)
);

displayReceipts();
updateIncomeTracker();


    let message = `✨ *Top Pressing Receipt* ✨

      Receipt #${orderId}
      Customer:
      ${customerName}
      Items: `;

    currentCartItems.forEach(item => {
      message += `• ${item.name} x${item.qty} - ${item.totalItemPrice} UM\n`;
    });

    message += `\nTotal: ${total} UM`;

    let phone = customerPhone.replace(/\D/g,"");

    window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  });

    window.markAsPaid = function(orderId){

  let savedOrders = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  savedOrders = savedOrders.map(order => {

    if(order.id === orderId){
      order.paymentStatus = "Paid";
      order.paidDate = new Date().toISOString();
    }

    return order;

  });

  localStorage.setItem(
    "laundryReceipts",
    JSON.stringify(savedOrders)
  );

  displayReceipts();
  updateIncomeTracker();
};

clearHistoryBtn.addEventListener("click", () => {

  const password = prompt("Enter the owner password to delete all order history:");

  if (password !== OWNER_PASSWORD) {
       alert("❌ Incorrect password. Nothing was deleted.");
    return;
  }

  const confirmDelete = confirm("⚠️ Are you sure you want to permanently delete ALL order history?");

  if (!confirmDelete) {
    return;
  }

  localStorage.removeItem("laundryReceipts");

  displayReceipts();
  updateIncomeTracker();

  alert("✅ All order history has been deleted.");

});

  function updateIncomeTracker(){

  let receipts = JSON.parse(localStorage.getItem("laundryReceipts")) || [];

  let paidTotal = 0;
  let unpaidTotal = 0;
  let weeklyIncome = 0;
  let monthlyIncome = 0;
  let dailyIncome = 0;

  let now = new Date();

  let currentMonth = now.getMonth();
  let startOfWeek = new Date(now);

  startOfWeek.setDate(
    now.getDate() - now.getDay()
  );

  startOfWeek.setHours(0, 0, 0, 0);


  receipts.forEach(receipt => {

  if(receipt.paymentStatus === "Paid"){

  let paidDate = new Date(receipt.paidDate);

  if(paidDate.toDateString() === now.toDateString()){
    dailyIncome += receipt.totalOrderPrice;
  }

  paidTotal += receipt.totalOrderPrice;

  // THIS WEEK
  if(paidDate >= startOfWeek){
    weeklyIncome += receipt.totalOrderPrice;
  }

    // THIS MONTH
    if(
      paidDate.getMonth() === currentMonth &&
      paidDate.getFullYear() === now.getFullYear()
    ){
      monthlyIncome += receipt.totalOrderPrice;
    }
  }
  else {
    unpaidTotal += receipt.totalOrderPrice;
  }
});


  document.getElementById("paidTotal").textContent = paidTotal + " UM";
  document.getElementById("unpaidTotal").textContent = unpaidTotal + " UM";
  document.getElementById("dailyIncome").textContent = dailyIncome + " UM";
  document.getElementById("weeklyIncome").textContent = weeklyIncome + " UM";
  document.getElementById("monthlyIncome").textContent = monthlyIncome + " UM";

}
  displayReceipts();
  updateIncomeTracker();
  orderId 
});
 
</script>
